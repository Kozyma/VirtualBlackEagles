<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>404 - 페이지를 찾을 수 없습니다 | Virtual Black Eagles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-container { text-align: center; padding: 2rem; }
        .error-code { font-size: 8rem; font-weight: 900; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .error-msg { font-size: 1.5rem; color: #aaa; margin: 1rem 0 0.5rem; }
        .error-desc { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }
        .back-btn { display: inline-block; padding: 0.75rem 2rem; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; text-decoration: none; border-radius: 30px; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; }
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(102,126,234,0.4); }
        @media (max-width: 480px) { .error-code { font-size: 5rem; } .error-msg { font-size: 1.1rem; } }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-msg">페이지를 찾을 수 없습니다</div>
        <div class="error-desc">요청하신 페이지가 존재하지 않거나 이동되었습니다.</div>
        <a href="/" class="back-btn">홈으로 돌아가기</a>
    </div>
</body>
</html>
