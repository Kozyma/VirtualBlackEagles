{% extends "admin/admin_base.html" %}
{% block title %}회원 수정{% endblock %}
{% block page_title %}회원 수정{% endblock %}

{% block top_actions %}
<a href="{{ url_for('admin_users') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> 목록</a>
{% endblock %}

{% block content %}
<div class="form-container">
  <form method="POST">
    <div class="form-group">
      <label>이메일</label>
      <input type="text" class="form-control" value="{{ user.email }}" disabled style="background:#f8f9fa;">
    </div>
    <div class="form-group">
      <label>아이디</label>
      <input type="text" class="form-control" value="{{ user.username or '-' }}" disabled style="background:#f8f9fa;">
    </div>
    <div class="form-group">
      <label>Google ID</label>
      <input type="text" class="form-control" value="{{ user.google_id or '없음' }}" disabled style="background:#f8f9fa;">
    </div>
    <div class="form-group">
      <label for="display_name">닉네임</label>
      <input type="text" id="display_name" name="display_name" class="form-control"
             value="{{ user.display_name or '' }}">
    </div>
    <div class="form-group">
      <label for="role">역할</label>
      <select id="role" name="role" class="form-control">
        <option value="member" {{ 'selected' if user.role == 'member' }}>member (일반 회원)</option>
        <option value="moderator" {{ 'selected' if user.role == 'moderator' }}>moderator (운영진)</option>
        <option value="admin" {{ 'selected' if user.role == 'admin' }}>admin (관리자)</option>
      </select>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;">
        <input type="checkbox" name="is_active" {{ 'checked' if user.is_active }}>
        활성 상태
      </label>
    </div>
    <div style="padding:1rem;background:#f8f9fa;border-radius:6px;margin-bottom:1rem;font-size:0.9rem;color:#666;">
      <div>가입일: {{ user.created_at or '-' }}</div>
      <div>수정일: {{ user.updated_at or '-' }}</div>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">취소</a>
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 저장</button>
    </div>
  </form>
</div>
{% endblock %}
